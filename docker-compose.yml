---
name: pbsmmapi

services:
  postgres:
    image: postgres:17
    environment:
      - PGUSER
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_DB=${PGDATABASE}
    ports:
      - "55432:5432"
    volumes:
      - ./.ephemeral/postgres-data:/var/lib/postgresql/data
      - ./.ephemeral/dumps:/dumps
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
